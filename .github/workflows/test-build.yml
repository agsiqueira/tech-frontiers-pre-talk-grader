name: Test Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-build:
    name: Test build on Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package app without release
        run: npm run pack

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: tech-frontiers-pre-talk-grader-test-build
          path: dist/
